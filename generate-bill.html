<!DOCTYPE HTML>
<html>
<head>
    <title>Generate Bill - Plastron Products</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #64665A;
        }
        form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        p {
            margin: 15px 0;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        select, input[type="text"], input[type="checkbox"], input[type="date"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        select, input[type="text"], input[type="date"] {
            width: 300px;
        }
        input[type="submit"] {
            background-color: #64665A;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        input[type="submit"]:hover {
            background-color: #555;
        }
        .button {
            background-color: #64665A;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .button:hover {
            background-color: #555;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<h1> Plastron Products </h1>
<form id="billForm">
    <p>
        <label for="customer">Company Name:</label>
        <select name="customer" id="customer" required>
            <option value="">-- Select Customer --</option>
        </select>
    </p>
    <p id="invoiceNumberField">
        <label for="invoiceNumber" id="invoiceNumberLabel">Tax Invoice number:</label>
        <input type="text" id="invoiceNumber" name="invoiceNumber" required placeholder="Enter invoice number"/>
    </p>
    <p id="invoiceDateField" style="display: none;">
        <label for="invoiceDate">Invoice Date:</label>
        <input type="date" id="invoiceDate" name="invoiceDate"/>
    </p>
    <p>
        <label for="purchaseOrder">Purchase Order:</label>
        <input type="text" id="purchaseOrder" name="purchaseOrder" placeholder="Enter PO number"/>
    </p>
    <p id="dcNumberField">
        <label for="dcNumber">DC Number:</label>
        <input type="text" id="dcNumber" name="dcNumber" placeholder="Enter DC number"/>
    </p>
    <p id="packingField">
        <label for="packing">Add P&F (1%):</label>
        <input type="checkbox" id="packing" name="packing"/>
    </p>
    <p><input type="submit" value="Submit"/></p>
    <p><button type="button" class="button" onclick="resetAndHome()">Reset & Home</button></p>
</form>

<script>
// CSV Parser - handles quoted fields properly
function parseCSV(text) {
    const lines = text.split('\n');
    const result = [];
    const headers = lines[0].split(',').map(h => h.trim());
    
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        
        const values = [];
        let currentValue = '';
        let inQuotes = false;
        
        for (let j = 0; j < lines[i].length; j++) {
            const char = lines[i][j];
            
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                values.push(currentValue.trim());
                currentValue = '';
            } else {
                currentValue += char;
            }
        }
        values.push(currentValue.trim());
        
        const obj = {};
        headers.forEach((header, index) => {
            obj[header] = values[index] || '';
        });
        result.push(obj);
    }
    
    return result;
}

// Show notification message
function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.position = 'fixed';
    notification.style.top = '20px';
    notification.style.right = '20px';
    notification.style.backgroundColor = '#64665A';
    notification.style.color = 'white';
    notification.style.padding = '15px 20px';
    notification.style.borderRadius = '5px';
    notification.style.zIndex = '1000';
    notification.style.boxShadow = '0 2px 5px rgba(0,0,0,0.3)';
    notification.textContent = message;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
        document.body.removeChild(notification);
    }, 3000);
}

// Load customers from CSV
async function loadCustomers() {
    let customers = [];
    try {
        const response = await fetch('customers.csv');
        const csvText = await response.text();
        customers = parseCSV(csvText);
    } catch (error) {
        document.getElementById('customer').innerHTML = '<option value="">Error loading customers. Please ensure customers.csv exists.</option>';
        return;
    }
    
    const customerSelect = document.getElementById('customer');
    customers.forEach(customer => {
        const option = document.createElement('option');
        option.value = customer.customer_id;
        option.textContent = customer.customer_name;
        option.dataset.customer = JSON.stringify(customer);
        customerSelect.appendChild(option);
    });
}

// Form submission
document.getElementById('billForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const customerSelect = document.getElementById('customer');
    const selectedOption = customerSelect.options[customerSelect.selectedIndex];
    
    if (!selectedOption || !selectedOption.value) {
        showNotification('Please select a customer');
        return;
    }
    
    const customerData = JSON.parse(selectedOption.dataset.customer);
    const type = getUrlParameter('type');
    const isProforma = type === 'proforma';
    
    // Parse tax values carefully - trim and convert to float
    const cgstValue = parseFloat(String(customerData.cgst).trim()) || 0;
    const sgstValue = parseFloat(String(customerData.sgst).trim()) || 0;
    const igstValue = parseFloat(String(customerData.igst).trim()) || 0;
    
    const formData = {
        type: type || 'bill',
        customerId: customerData.customer_id,
        customerName: customerData.customer_name,
        addressLineOne: customerData.address_line_one,
        addressLineTwo: customerData.address_line_two,
        gstn: customerData.gstn,
        contactNumber: customerData.contact_number,
        customerMailId: customerData.customer_mail_id,
        cgst: cgstValue,
        sgst: sgstValue,
        igst: igstValue,
        invoiceNumber: document.getElementById('invoiceNumber').value,
        purchaseOrder: document.getElementById('purchaseOrder').value,
        dcNumber: document.getElementById('dcNumber').value,
        packing: document.getElementById('packing').checked,
        invoiceDate: document.getElementById('invoiceDate').value,
        billingDate: new Date().toISOString().split('T')[0]
    };
    
    // Validate required fields
    if (!formData.invoiceNumber) {
        showNotification(isProforma ? 'Please enter proforma invoice number' : 'Please enter tax invoice number');
        return;
    }
    
    if (isProforma && !formData.invoiceDate) {
        showNotification('Please enter invoice date');
        return;
    }
    
    // Store in localStorage
    localStorage.setItem('billFormData', JSON.stringify(formData));
    
    // Navigate to products page with type parameter
    window.location.href = 'products.html?type=' + (type || 'bill');
});

// Get URL parameter
function getUrlParameter(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// Initialize form based on type
function initForm() {
    const type = getUrlParameter('type');
    const isProforma = type === 'proforma';
    
    if (isProforma) {
        // Proforma invoice mode
        document.getElementById('invoiceNumberLabel').textContent = 'Proforma Invoice number:';
        document.getElementById('invoiceDateField').style.display = 'block';
        document.getElementById('dcNumberField').style.display = 'none';
        document.getElementById('packingField').style.display = 'none';
        document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('invoiceDate').required = true;
        document.getElementById('dcNumber').required = false;
    }
}

// Load customers on page load
loadCustomers();
initForm();

// Reset and go to home
function resetAndHome() {
    if (confirm('Are you sure you want to reset and go to home? This will clear all cached data.')) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
}
</script>
</body>
</html>
